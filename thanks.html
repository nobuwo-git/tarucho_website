<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ご購入ありがとうございました | TARUCHO ONLINE SHOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ネパール料理タルチョ オンラインショップ ご購入完了">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* サンクスページ専用の簡易スタイル調整 */
        .thanks-container {
            text-align: center;
            padding: 100px 20px;
        }

        .thanks-container h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #4A593D;
            /* ロゴ等に合わせた緑系 */
        }

        .thanks-container p {
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .back-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #91A363;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: opacity 0.3s;
        }

        .back-button:hover {
            opacity: 0.8;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QQZYMD97RT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-QQZYMD97RT');
    </script>
</head>

<body>

    <header class="fixed-header">
        <div class="headImgText">
            <a href="index.html"><img src="images/tarucho_head_title.png" alt="タルチョ"></a>
        </div>
        <a href="cart.html" class="header-cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge">0</span>
        </a>
    </header>

    <main>
        <section class="section">
            <div class="contents">
                <div class="thanks-container">
                    <h2>Thank You!</h2>
                    <p>
                        ご購入ありがとうございました。<br>
                        ご注文確認メールをお送りいたしましたので、ご確認ください。<br>
                        商品の発送まで、今しばらくお待ちくださいませ。
                    </p>

                    <a href="index.html" class="back-button">トップページへ戻る</a>
                </div>
            </div>
        </section>

        <footer class="section">
            <div class="contents">
                <small>Copyright© TARUCHO All Rights Reserved.</small>
            </div>
        </footer>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        $(document).ready(function () {
            // 1. カートの中身を空にする
            const STORAGE_KEY = 'tarucho_cart';
            localStorage.removeItem(STORAGE_KEY);

            // 2. カートのバッジ（数字）をリセットする
            $('.cart-badge').text('0').hide();

            console.log('Cart has been cleared after successful purchase.');
        });
    </script>

</body>

</html>
