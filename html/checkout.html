<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>決済手続き - TARUCHO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--accent-color); font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; background: rgba(255,255,255,0.9); font-size: 1rem;
        }
        .order-summary { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid var(--accent-color); }
    </style>
</head>
<body>
<main>
    <section class="section">
        <div class="contents">
            <h2 class="c">Checkout</h2>

            <div class="order-summary">
                <h3>ご注文内容の確認</h3>
                <div id="checkout-items"></div>
                <p class="r" style="font-size: 1.2rem; margin-top: 10px;">合計: <span id="final-amount">0</span> yen</p>
            </div>

            <form id="payment-form">
                <div class="form-group">
                    <label>氏名</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>配送先住所</label>
                    <textarea name="address" rows="3" required></textarea>
                </div>
                <button type="submit" class="cartBtn" style="width: 100%; height: 60px; margin-top: 20px;">
                    注文を確定して決済へ進む
                </button>
            </form>
        </div>
    </section>
</main>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>

<script>
$(function() {
    // 【重要】ここにあなたのStripe公開鍵(pk_test_...)を入れてください
    const stripe = Stripe('pk_test_51Sozp02No4lhavLWeGlqNgEyX03BpqsWH6KSfxLcqVPOEaESrEOxj82J5NJlEvttNGdia8BJeXhFhO6OMmP73PEr00SEzsnNPK');

    // --- 1. カートの中身を表示する処理 ---
    const cart = JSON.parse(localStorage.getItem('tarucho_cart')) || [];
    let total = 0;
    const $container = $('#checkout-items');

    if (cart.length === 0) {
        $container.html('<p>カートが空です</p>');
    } else {
        cart.forEach(item => {
            total += item.price * item.quantity;
            $container.append(`<p>${item.name} × ${item.quantity} (${(item.price * item.quantity).toLocaleString()} yen)</p>`);
        });
        $('#final-amount').text(total.toLocaleString());
    }

    // --- 2. 注文確定ボタンを押した時の処理 ---
    $('#payment-form').on('submit', async function(e) {
        e.preventDefault();
        const $btn = $(this).find('button');
        $btn.prop('disabled', true).text('決済ページへ移動中...');

        // データを確実にPHPへ送るための形式変換
        const params = new URLSearchParams();
        params.append('cart_data', JSON.stringify(cart));

        try {
            // PHPを呼び出す
            const response = await fetch('create-session.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'サーバーエラー');
            }

            const session = await response.json();

            // Stripeの決済画面へリダイレクト
            const result = await stripe.redirectToCheckout({
                sessionId: session.id
            });

            if (result.error) {
                throw new Error(result.error.message);
            }

        } catch (error) {
            console.error('Error:', error);
            alert('エラー: ' + error.message);
        } finally {
            $btn.prop('disabled', false).text('注文を確定して決済へ進む');
        }
    });
});
</script>
</body>
</html>
