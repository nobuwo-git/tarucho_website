    <style>
        /* 背景を強制的に固定 */
        #onlineshop.section::before {
            content: "";
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            animation: none !important;
        }

        /* コンテンツエリアの調整 */
        #onlineshop .contents {
            background: rgba(255, 255, 255, 0.9);
            /* 白背景を少し透かして清潔感を出す */
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
            color: #333;
        }

        .remove-btn:hover {
            background: var(--highlight-color);
            color: #fff;
        }

        /* 決済ボタンをコンパクトにする */
        #payment-form button {
            display: block;
            /* ブロック要素にする */
            width: 200px;
            /* ボタンの幅を固定（お好みで調整してください） */
            margin: 30px auto 0;
            /* 中央寄せにし、上に余白を作る */
            background: var(--secondary-color);
            color: #fff;
            border: none;
            padding: 12px 0;
            /* 上下を少しスリムに */
            font-size: 1.1rem;
            /* 文字サイズを標準的に */
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            /* 軽い影をつけてボタンらしく */
        }

        /* ホバー時の演出 */
        #payment-form button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            /* 少し浮き上がらせる */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* 決済処理中の状態 */
        #payment-form button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* ショップに戻るボタンのデザイン */
        .btn-back {
            display: inline-block;
            width: 160px;
            /* ボタンの幅 */
            background: #fff;
            /* 背景は白 */
            color: var(--secondary-color) !important;
            /* 文字色はサブカラー */
            border: 2px solid var(--secondary-color);
            /* 枠線を付ける */
            padding: 1px 5px 1px 5px;
            margin-top: 30px;
            border-radius: 30px;
            /* 丸みをつける */
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            /* 変化をなめらかに */
        }

        /* マウスを乗せた時の動き（反転させる） */
        .btn-back:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            /* 少し浮き上がらせる */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* スマホ対応 */
        @media screen and (max-width: 600px) {
            .cart-item {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .cart-item-name {
                grid-column: 1 / 3;
            }
        }
    </style>

</head>
